version: '3.8'

services:
  radius:
    image: freeradius/freeradius-server:latest
    container_name: kovorking-radius
    ports:
      - "1812:1812/udp"
      - "1813:1813/udp"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: kovorking-grafana
    ports:
      - "3000:3000"
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: kovorking-prometheus
    ports:
      - "9090:9090"
    restart: unless-stopped